function importBattersCSV(file){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const {rows}=parseCSV(e.target.result);
      const slate=[];
      rows.forEach(row=>{
        const name=colVal(row,"BATTER","PLAYER","NAME");
        if(!name)return;
        const pitcherName=colVal(row,"PITCHER","OPP PITCHER","OPP");
        // Match pitcher by name (fuzzy)
        let matchedPit=null;
        if(pitcherName){
          matchedPit=findPitcher(pitcherName);
        }
        // Hand parsing
        let hand=colVal(row,"HAND","B","BATS")||"";
        if(hand==="L")hand="LHB";
        else if(hand==="R")hand="RHB";
        else if(hand==="S"||hand==="B")hand="Switch";
        else if(!hand)hand="RHB"; // default

        // Build batter object for scoring
        const bat={
          name,
          team:colVal(row,"BATTER TEAM","TEAM","TM")||"",
          hand,
          pitcherName:pitcherName||matchedPit?.name||"",
          pitcherId:matchedPit?.id||"",
          pitcherHand:matchedPit?.hand||"",
          // EV / batted ball — may not be in BvP CSV, leave null
          avgEV:colVal(row,"EV","AVG EV","EXIT VELOCITY")||"",
          barrelPct:colVal(row,"BARREL%","BARREL RATE")||"",
          hrFbPct:colVal(row,"HR/FB","HR/FB%","HRFB%")||"",
          hardHitPct:colVal(row,"HARD HIT%","HARD HIT RATE","HH%")||"",
          fbPct:colVal(row,"FB%","FLY BALL%")||"",
          gbPct:colVal(row,"GB%","GROUND BALL%")||"",
          ldPct:colVal(row,"LD%","LINE DRIVE%")||"",
          pullPct:colVal(row,"PULL%","PULL RATE")||"",
          // BvP direct data
          iso:colVal(row,"ISO")||"",
          abVsPitcher:colVal(row,"AB")||"",
          hrVsPitcher:colVal(row,"HR")||"",
          slgVsPitcher:colVal(row,"SLG")||"",
          avgVsPitcher:colVal(row,"AVG","AVG.")||"",
          bvpSource:"Direct BvP (vs this pitcher)",
          // defaults
          park:"",windDir:"Calm / Dome",pitchType:"None / Skip",odds:"",
        };
        const grade=score(bat,matchedPit||null);
        // Normalize pct against only categories that have real data
        // (categories with label "—", "No data", "N/A" etc. had no input)
        const NO_DATA=new Set(["—","No data","N/A","No pitcher linked","Splits mode"]);
        const filledMax=Object.entries(grade.B).reduce((sum,[k,v])=>{
          return NO_DATA.has(v.l)?sum:sum+(W[k]?.max||0);
        },0);
        const normalizedPct=filledMax>0?Math.min(grade.total/filledMax,1):0;
        slate.push({...bat,grade,normalizedPct,matched:!!matchedPit});
      });
      S.slate=slate;
      S.slateHandFilter="All";S.slatePitcherFilter="";
      S.tab="slate";render();
      toast(`✅ ${slate.length} batters loaded into Slate`);
    }catch(err){alert("Batter CSV error: "+(err.message||String(err)));}
  };
  r.readAsText(file);
}

// ── BALLPARKPAL ───────────────────────────────────────────────────────────
function parseBallparkPal(csvText){
  const lines=csvText.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
  return lines.slice(1).map(line=>{
    const vals=line.split(',').map(v=>v.trim().replace(/"/g,''));
    const row={};
    headers.forEach((h,i)=>row[h]=vals[i]||'');
    const handMap={L:'LHB',R:'RHB',S:'Switch'};
    return{
      name:       row['FullName']||'',
      team:       row['Team']||'',
      opponent:   row['Opponent']||'',
      lineupSpot: row['BattingPosition']||'',
      hand:       handMap[row['BatterStand']]||'',
      bpHRProb:   parseFloat(row['HomeRunProbability'])||null,
      bpHitProb:  parseFloat(row['HitProbability'])||null,
      bpProjHR:   parseFloat(row['HomeRuns'])||null,
      bpPointsDK: parseFloat(row['PointsDK'])||null,
      bpPointsFD: parseFloat(row['PointsFD'])||null,
    };
  }).filter(b=>b.name);
}

function parseBpRows(rows){
  const handMap={L:'LHB',R:'RHB',S:'Switch'};
  return rows.map(row=>({
    name:       row['FullName']||'',
    team:       row['Team']||'',
    opponent:   row['Opponent']||'',
    lineupSpot: row['BattingPosition']||'',
    hand:       handMap[row['BatterStand']]||'',
    bpHRProb:   parseFloat(row['HomeRunProbability'])||null,
    bpHitProb:  parseFloat(row['HitProbability'])||null,
    bpProjHR:   parseFloat(row['HomeRuns'])||null,
    bpPointsDK: parseFloat(row['PointsDK'])||null,
    bpPointsFD: parseFloat(row['PointsFD'])||null,
  })).filter(b=>b.name);
}

function triggerBpImport(){
  const fi=document.createElement('input');
  fi.type='file';fi.accept='.xlsx,.xls,.csv';
  fi.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0;';
  fi.onchange=e=>{
    const file=e.target.files[0];
    document.body.removeChild(fi);
    if(!file)return;
    const reader=new FileReader();
    const isXlsx=/\.xlsx?$/i.test(file.name);
    reader.onerror=()=>toast('⚠️ File read error',5000);
    reader.onload=ev=>{
      let players;
      if(isXlsx){
        try{
          if(typeof XLSX==='undefined'){toast('⚠️ XLSX library not loaded — check internet',5000);return;}
          const wb=XLSX.read(ev.target.result,{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const rows=XLSX.utils.sheet_to_json(ws,{raw:false,defval:''});
          players=parseBpRows(rows);
        }catch(err){toast('⚠️ XLSX error: '+err.message,6000);return;}
      }else{
        players=parseBallparkPal(ev.target.result);
      }
      if(!players.length){toast('⚠️ No players found — check FullName column',5000);return;}
      // Dedupe by name keeping highest bpHRProb (file has one row per player per game)
      const seen=new Map();
      players.forEach(p=>{if(!seen.has(p.name)||( p.bpHRProb||0)>(seen.get(p.name).bpHRProb||0))seen.set(p.name,p);});
      processBpPlayers([...seen.values()]);
    };
    if(isXlsx)reader.readAsArrayBuffer(file);
    else reader.readAsText(file);
  };
  document.body.appendChild(fi);
  fi.click();
}

function processBpPlayers(players){
  const NO_DATA=new Set(["—","No data","N/A","No pitcher linked","Splits mode"]);
  let top20;
  try{
    players.forEach(p=>{
      const sb=S.slate.find(b=>matchBatterName(b.name,p.name));
      if(sb){
        sb.bpHRProb=p.bpHRProb;
        const pit=S.pitchers.find(x=>String(x.id)===String(sb.pitcherId));
        sb.grade=score(sb,pit||null);
        const fm=Object.entries(sb.grade.B).reduce((s,[k,v])=>NO_DATA.has(v.l)?s:s+(W[k]?.max||0),0);
        sb.normalizedPct=fm>0?Math.min(sb.grade.total/fm,1):0;
      }
    });
    top20=buildBoardFromBP(players);
  }catch(err){
    toast('❌ Build error: '+err.message,8000);
    console.error(err);return;
  }
  if(!top20||!top20.length){toast('⚠️ No batters could be graded',5000);return;}
  const withPit=top20.filter(b=>b.pitcherId||b.pitcherName).length;
  const withBvp=top20.filter(b=>b.bvpSource==='Direct BvP (vs this pitcher)').length;
  const doLoad=()=>{
    try{
      S.batters=top20;save();S.tab='board';render();
      toast(`✅ Board: ${top20.length} batters loaded`,5000);
    }catch(e){toast('❌ Render error: '+e.message,8000);console.error(e);}
  };
  if(S.batters.length>0){
    const ov=el('div','');
    Object.assign(ov.style,{position:'fixed',inset:'0',background:'rgba(0,0,0,.8)',zIndex:'300',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'});
    const box=el('div','card');
    box.style.cssText='max-width:340px;width:100%;padding:20px;text-align:center;';
    box.innerHTML=`<div style="font-weight:700;font-size:16px;margin-bottom:8px">Replace Board?</div><div style="font-size:13px;color:var(--muted);margin-bottom:18px">Load top ${top20.length} from BallparkPal?<br>Current ${S.batters.length} picks will be replaced.</div>`;
    const yes=el('button','btn-primary','✅ Yes, Load Board');
    yes.style.width='100%';
    yes.onclick=()=>{document.body.removeChild(ov);doLoad();};
    const no=el('button','btn-secondary','Cancel');
    no.style.cssText='width:100%;margin-top:8px;';
    no.onclick=()=>document.body.removeChild(ov);
    box.appendChild(yes);box.appendChild(no);
    ov.appendChild(box);document.body.appendChild(ov);
  }else{
    doLoad();
  }
}

function buildBoardFromBP(players){
  const today=new Date().toISOString().slice(0,10);
  const NO_DATA=new Set(["—","No data","N/A","No pitcher linked","Splits mode"]);
  const BP_MIN=0.08; // minimum BallparkPal HR probability to qualify for top 20 (8%+)
  return players.filter(p=>(p.bpHRProb||0)>=BP_MIN).map(p=>{
    try{
      const sl=S.slate.find(b=>matchBatterName(b.name,p.name));
      let pit=null;
      if(sl?.pitcherId) pit=S.pitchers.find(x=>String(x.id)===String(sl.pitcherId));
      if(!pit&&p.opponent) pit=S.pitchers.find(x=>x.team&&x.team.toUpperCase().replace(/\s/g,'')===p.opponent.toUpperCase().replace(/\s/g,''));
      const bat={
        name:p.name, team:p.team||sl?.team||'',
        hand:p.hand||sl?.hand||'RHB',
        lineupSpot:p.lineupSpot||sl?.lineupSpot||'',
        pitcherId:pit?.id||sl?.pitcherId||'',
        pitcherName:pit?.name||sl?.pitcherName||p.opponent||'',
        pitcherHand:pit?.hand||sl?.pitcherHand||'',
        avgEV:sl?.avgEV||'', barrelPct:sl?.barrelPct||'',
        hrFbPct:sl?.hrFbPct||'', hardHitPct:sl?.hardHitPct||'',
        fbPct:sl?.fbPct||'', pullPct:sl?.pullPct||'',
        iso:sl?.iso||'', abVsPitcher:sl?.abVsPitcher||'',
        hrVsPitcher:sl?.hrVsPitcher||'', slgVsPitcher:sl?.slgVsPitcher||'',
        avgVsPitcher:sl?.avgVsPitcher||'',
        bvpSource:sl?'Direct BvP (vs this pitcher)':'BallparkPal',
        bpHRProb:p.bpHRProb, bpHitProb:p.bpHitProb,
        bpProjHR:p.bpProjHR, bpPointsDK:p.bpPointsDK, bpPointsFD:p.bpPointsFD,
        park:'', windDir:'Calm / Dome', pitchType:'None / Skip', odds:'', date:today,
      };
      const grade=score(bat,pit||null);
      const filledMax=Object.entries(grade.B).reduce((s,[k,v])=>NO_DATA.has(v.l)?s:s+(W[k]?.max||0),0);
      const normalizedPct=filledMax>0?Math.min(grade.total/filledMax,1):0;
      return{...bat,id:Date.now()+Math.random(),grade,normalizedPct,result:'Pending'};
    }catch(e){console.error('BP score error for',p.name,e);return null;}
  }).filter(Boolean)
    .filter((b,i,arr)=>arr.findIndex(x=>x.name===b.name)===i) // dedupe by name
    .sort((a,b)=>{
      // Priority: confirmed lineup > pitcher matched > score
      const aConf=a.lineupSpot&&parseInt(a.lineupSpot)>0?1:0;
      const bConf=b.lineupSpot&&parseInt(b.lineupSpot)>0?1:0;
      if(bConf!==aConf)return bConf-aConf;
      const aPit=a.pitcherId?1:0, bPit=b.pitcherId?1:0;
      if(bPit!==aPit)return bPit-aPit;
      return (b.normalizedPct||0)-(a.normalizedPct||0);
    })
    .reduce((acc,b)=>{
      if(acc.length>=20)return acc;
      const key=(b.pitcherName||b.pitcherHand||'unk').toLowerCase().trim();
      const cnt=acc.filter(x=>(x.pitcherName||x.pitcherHand||'unk').toLowerCase().trim()===key).length;
      if(cnt<3)acc.push(b);
      return acc;
    },[]);
}

// ── FANGRAPHS IMPORT ─────────────────────────────────────────────────────
// Minimum qualification thresholds for each metric
const FG_MIN={barrelPct:.15,ev:90,batSpd:69,idealAtkAngPct:.55,pullPct:.40};

function scoreFGBatter(b){
  // b.barrelPct / pullPct / idealAtkAngPct are raw decimals (0.15 = 15%)
  // b.ev / b.batSpd are mph
  function pts(val,t){
    return val>=t[0]?1:val>=t[1]?.82:val>=t[2]?.60:val>=t[3]?.38:.12;
  }
  const evS  =pts(b.ev,          [93,91,89,87]);
  const barS =pts(b.barrelPct,   [.20,.15,.09,.04]);
  const spdS =pts(b.batSpd,      [78,76,73,70]);
  const ataS =pts(b.idealAtkAngPct,[.80,.70,.60,.50]);
  const pulS =pts(b.pullPct,     [.50,.44,.38,.32]);
  // Barrel 30% · EV 25% · BatSpd 20% · AttackAngle 15% · Pull 10%
  return barS*.30 + evS*.25 + spdS*.20 + ataS*.15 + pulS*.10;
}

function getFGTier(b){
  const met=[
    b.barrelPct>=FG_MIN.barrelPct,
    b.ev>=FG_MIN.ev,
    b.batSpd>=FG_MIN.batSpd,
    b.idealAtkAngPct>=FG_MIN.idealAtkAngPct,
    b.pullPct>=FG_MIN.pullPct,
  ].filter(Boolean).length;
  if(met===5)return{tier:"🔥 Elite",    met,color:"#5cb870",bg:"rgba(82,194,120,.12)", border:"rgba(82,194,120,.35)"};
  if(met>=3) return{tier:"✅ Favorable",met,color:"#e8a830",bg:"rgba(200,146,42,.12)",border:"rgba(200,146,42,.35)"};
  if(met>=2) return{tier:"⚠️ Average",  met,color:"#b89050",bg:"rgba(160,116,42,.08)",border:"rgba(160,116,42,.25)"};
  return       {tier:"⛔ Risky",        met,color:"#c0392b",bg:"rgba(192,57,43,.08)", border:"rgba(192,57,43,.25)"};
}

function importFGCSV(file){
  const reader=new FileReader();
  reader.onerror=()=>toast('⚠️ File read error',5000);
  reader.onload=ev=>{
    const {rows,headers}=parseCSV(ev.target.result);
    if(!rows.length){toast('⚠️ No data in FanGraphs CSV',5000);return;}
    const h=k=>headers.includes(k);
    const nameKey=h('NAME')?'NAME':h('NAMEASCII')?'NAMEASCII':null;
    if(!nameKey){toast('⚠️ No Name column found in FanGraphs CSV',5000);return;}
    const col=k=>h(k)?k:null;
    const evKey=col('EV'),barKey=col('BARREL%'),spdKey=col('BATSPD'),ataKey=col('IDEALATKANG%'),pullKey=col('PULL%'),teamKey=col('TEAM');
    const batters=rows.filter(r=>r[nameKey]?.trim()).map(r=>{
      const name=r[nameKey].trim();
      const team=teamKey?r[teamKey]?.trim():'';
      const ev=parseFloat(r[evKey])||0;
      const barrelPct=parseFloat(r[barKey])||0;
      const batSpd=parseFloat(r[spdKey])||0;
      const idealAtkAngPct=parseFloat(r[ataKey])||0;
      const pullPct=parseFloat(r[pullKey])||0;
      const fgScore=scoreFGBatter({ev,barrelPct,batSpd,idealAtkAngPct,pullPct});
      const fgTier=getFGTier({ev,barrelPct,batSpd,idealAtkAngPct,pullPct});
      return{name,team,ev,barrelPct,batSpd,idealAtkAngPct,pullPct,fgScore,fgTier};
    }).filter(b=>b.ev>0); // drop empty rows
    if(!batters.length){toast('⚠️ No valid rows parsed — check column headers',5000);return;}
    batters.sort((a,b)=>b.fgScore-a.fgScore);
    S.fgBatters=batters.slice(0,20).map((b,i)=>({...b,fgRank:i+1}));
    const byTier=t=>S.fgBatters.filter(b=>b.fgTier.tier===t).length;
    render();
    toast(`✅ FanGraphs: ${byTier("🔥 Elite")} Elite · ${byTier("✅ Favorable")} Favorable · ${byTier("⚠️ Average")} Avg · ${byTier("⛔ Risky")} Risky`);
  };
  reader.readAsText(file);
}

function rSlate(c){
  // Header
  const hd=mk("div",{marginBottom:"14px"});
  const title=mk("div",{fontFamily:"'Rajdhani',sans-serif",fontWeight:"700",fontSize:"20px",color:"var(--text)",marginBottom:"10px"});
  title.textContent="📋 Slate Analysis";
  hd.appendChild(title);

  if(S.slate.length===0){
    c.appendChild(hd);
    const e=el("div","empty");
    e.innerHTML=`<div class="empty-icon">📋</div><div class="empty-title">No slate loaded</div><div class="empty-sub">Import a batter vs pitcher CSV to auto-grade all matchups</div>`;
    const csvLbl=el("label","btn-outline","📥 Import Batter CSV");
    csvLbl.style.cssText="display:block;cursor:pointer;text-align:center;padding:14px 0;border-radius:14px;margin-top:16px;";
    const csvInp=document.createElement("input");csvInp.type="file";csvInp.accept=".csv";csvInp.style.display="none";
    csvInp.onchange=ev=>{if(ev.target.files[0])importBattersCSV(ev.target.files[0]);};
    csvLbl.appendChild(csvInp);e.appendChild(csvLbl);
    c.appendChild(e);return;
  }

  // Import + clear controls
  const ctrlRow=mk("div",{display:"flex",gap:"7px",marginBottom:"12px"});
  const reImportLbl=el("label","btn-sm","📥 Re-import CSV");
  reImportLbl.style.cssText="cursor:pointer;padding:7px 12px;border-radius:8px;font-size:12px;border:1px solid var(--border2);background:var(--card2);color:var(--muted);display:inline-block;";
  const reImp=document.createElement("input");reImp.type="file";reImp.accept=".csv";reImp.style.display="none";
  reImp.onchange=ev=>{if(ev.target.files[0])importBattersCSV(ev.target.files[0]);};
  reImportLbl.appendChild(reImp);ctrlRow.appendChild(reImportLbl);
  const clrBtn=el("button","btn-sm","🗑 Clear");
  clrBtn.onclick=()=>{S.slate=[];render();};
  ctrlRow.appendChild(clrBtn);
  hd.appendChild(ctrlRow);
  c.appendChild(hd);

  // Hand filter pills
  const fr=el("div","filter-row");
  ["All","LHB","RHB","Switch"].forEach(f=>{
    const p=el("div","filt"+(S.slateHandFilter===f?" active":""),f);
    if(S.slateHandFilter===f){p.style.color="var(--accent2)";p.style.background="rgba(108,99,255,.08)";p.style.borderColor="rgba(108,99,255,.35)";}
    p.onclick=()=>{S.slateHandFilter=f;render();};
    fr.appendChild(p);
  });
  c.appendChild(fr);

  // Pitcher filter
  const pitchers=[...new Set(S.slate.map(b=>b.pitcherName).filter(Boolean))].sort();
  if(pitchers.length>1){
    const pitRow=mk("div",{marginBottom:"12px"});
    const pitSel=document.createElement("select");
    pitSel.style.cssText="width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:11px;color:var(--text);padding:10px 14px;font-size:14px;outline:none;appearance:none;-webkit-appearance:none;font-family:'Inter',sans-serif;";
    const allOpt=document.createElement("option");allOpt.value="";allOpt.textContent="All Pitchers";pitSel.appendChild(allOpt);
    pitchers.forEach(p=>{const o=document.createElement("option");o.value=p;o.textContent=p;if(S.slatePitcherFilter===p)o.selected=true;pitSel.appendChild(o);});
    pitSel.onchange=ev=>{S.slatePitcherFilter=ev.target.value;render();};
    pitRow.appendChild(pitSel);c.appendChild(pitRow);
  }

  // Filter slate
  let filtered=S.slate;
  if(S.slateHandFilter!=="All")filtered=filtered.filter(b=>b.hand===S.slateHandFilter);
  if(S.slatePitcherFilter)filtered=filtered.filter(b=>b.pitcherName===S.slatePitcherFilter);

  if(filtered.length===0){
    const e=el("div","empty");e.innerHTML=`<div class="empty-icon">🔍</div><div class="empty-title">No matches</div><div class="empty-sub">Try changing the filter</div>`;
    c.appendChild(e);return;
  }

  // Use normalizedPct for slate labels (scores only filled categories)
  const effPct=b=>b.normalizedPct!==undefined?b.normalizedPct:b.grade.pct;
  // Summary bar
  const must=filtered.filter(b=>effPct(b)>=.67).length;
  const avg=filtered.filter(b=>effPct(b)>=.50&&effPct(b)<.67).length;
  const soft=filtered.filter(b=>effPct(b)>=.40&&effPct(b)<.50).length;
  const avoid=filtered.filter(b=>effPct(b)<.40).length;
  const bar=el("div","slate-bar");
  bar.style.marginBottom="14px";
  bar.innerHTML=`
    <div class="slate-stat"><div class="slate-num" style="color:#5cb870">${must}</div><div class="slate-lbl">Must</div></div>
    <div class="slate-div"></div>
    <div class="slate-stat"><div class="slate-num" style="color:#e8a830">${avg}</div><div class="slate-lbl">Avg</div></div>
    <div class="slate-div"></div>
    <div class="slate-stat"><div class="slate-num" style="color:#b89050">${soft}</div><div class="slate-lbl">Soft</div></div>
    <div class="slate-div"></div>
    <div class="slate-stat"><div class="slate-num" style="color:#c0392b">${avoid}</div><div class="slate-lbl">Avoid</div></div>`;
  c.appendChild(bar);

  // ── TOP TARGETS SECTION (collapsible) ───────────────────────────────────
  const topSec=el("div","card");
  topSec.style.cssText="padding:0;margin-bottom:14px;overflow:hidden;";
  const topToggleBtn=mk("div",{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",cursor:"pointer"});
  const topHdrTxt=mk("div",{fontFamily:"'Rajdhani',sans-serif",fontWeight:"700",fontSize:"16px",color:"var(--text)"});
  topHdrTxt.textContent="🎯 Top Targets by Pitcher";
  const topChevron=mk("span",{fontSize:"12px",color:"var(--muted)"},"▾");
  topToggleBtn.appendChild(topHdrTxt);topToggleBtn.appendChild(topChevron);
  topSec.appendChild(topToggleBtn);
  const topBody=mk("div",{padding:"0 18px 16px",display:"none"});
  topToggleBtn.onclick=()=>{const open=topBody.style.display!=="none";topBody.style.display=open?"none":"block";topChevron.textContent=open?"▾":"▴";};
  // expose topBody as container for pitcher blocks
  const topHdr=topBody;
  topSec.appendChild(topBody);

  const allPitchers=[...new Set(filtered.map(b=>b.pitcherName).filter(Boolean))];
  // Sort pitchers: most hittable first
  const pitVulnScore=pn=>{
    const sample=filtered.find(b=>b.pitcherName===pn);
    return sample?.grade?.B?.pitcher?.s||0;
  };
  allPitchers.sort((a,b)=>pitVulnScore(b)-pitVulnScore(a));

  allPitchers.forEach(pitName=>{
    const group=[...filtered.filter(b=>b.pitcherName===pitName)].sort((a,b)=>effPct(b)-effPct(a));
    const top3=group.slice(0,3);
    if(top3.length===0)return;
    const sampleVuln=top3[0]?.grade?.B?.pitcher;
    const vulnLbl=sampleVuln?.l||"";
    const isVH=vulnLbl==="Very Hittable",isH=vulnLbl==="Hittable",isT=vulnLbl==="Tough";
    const vc=isVH?"#52c278":isH?"#7db860":isT?"#c0392b":"#6e6585";
    const vb=isVH?"rgba(82,194,120,.12)":isH?"rgba(125,184,96,.07)":isT?"rgba(192,57,43,.06)":"var(--card2)";
    const vbr=isVH?"rgba(82,194,120,.35)":isH?"rgba(125,184,96,.25)":isT?"rgba(192,57,43,.2)":"var(--border)";
    const vtag=isVH?"🔥 VERY HITTABLE":isH?"⚡ HITTABLE":isT?"🔒 TOUGH":vulnLbl;

    const pitBlock=mk("div",{marginBottom:"14px",padding:"12px 14px",borderRadius:"12px",background:vb,border:`1.5px solid ${vbr}`});

    // Pitcher name + vuln tag
    const pitRow=mk("div",{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px",flexWrap:"wrap"});
    pitRow.innerHTML=`
      <span style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:var(--text)">${pitName}</span>
      ${vtag?`<span style="font-family:'Rajdhani',sans-serif;font-weight:800;font-size:10px;letter-spacing:.06em;padding:2px 7px;border-radius:5px;background:${vc}20;border:1px solid ${vc}44;color:${vc}">${vtag}</span>`:""}`;
    pitBlock.appendChild(pitRow);

    // Top 3 batter rows
    top3.forEach((b,i)=>{
      const ep=effPct(b);
      const pct=Math.round(ep*100);
      const handCol=b.hand==="LHB"?"#4a7fa8":b.hand==="RHB"?"#c8922a":"#5cb870";
      const pctCol=pct>=67?"#52c278":pct>=50?"#e8a830":pct>=40?"#b89050":"#c0392b";
      const G=b.grade.B;
      const hr=parseFloat(b.hrVsPitcher),ab=parseFloat(b.abVsPitcher);
      const platLbl=G.platoon?.l||"";

      // One-line advantage summary
      const adv=[];
      if(!isNaN(hr)&&hr>=1)adv.push(`<span style="color:#52c278;font-weight:700">${hr} HR in ${ab} ABs</span>`);
      if(platLbl==="Elite Edge"||platLbl==="Clear Edge")adv.push(`<span style="color:#52c278;font-weight:700">Platoon edge</span>`);
      if(G.bvp?.l==="Owns pitcher")adv.push(`<span style="color:#52c278;font-weight:700">Owns pitcher</span>`);
      const slg=parseFloat(b.slgVsPitcher),iso=parseFloat(b.iso);
      if(isNaN(hr)||hr===0){
        if(!isNaN(slg)&&slg>=.500)adv.push(`<span style="color:#e8a830;font-weight:700">SLG ${b.slgVsPitcher}</span>`);
        if(!isNaN(iso)&&iso>=.200)adv.push(`<span style="color:#e8a830;font-weight:700">ISO ${b.iso}</span>`);
      }

      const batRow=mk("div",{display:"flex",alignItems:"center",gap:"8px",padding:"7px 0",borderTop:i>0?"1px solid var(--border)":"none"});
      batRow.innerHTML=`
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);width:14px;flex-shrink:0">${i+1}</span>
        <span style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.name}</span>
        <span style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:${handCol}20;color:${handCol};flex-shrink:0">${b.hand}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${pctCol};flex-shrink:0">${pct}%</span>`;
      pitBlock.appendChild(batRow);

      if(adv.length){
        const advRow=mk("div",{fontSize:"11px",color:"var(--muted)",paddingLeft:"22px",marginTop:"-2px",marginBottom:"4px",lineHeight:"1.5"});
        advRow.innerHTML=adv.join(" · ");
        pitBlock.appendChild(advRow);
      }
    });

    topBody.appendChild(pitBlock);
  });

  c.appendChild(topSec);

  // ── DETAILED ROWS ─────────────────────────────────────────────────────────
  // Group by pitcher if no pitcher filter
  const sorted=[...filtered].sort((a,b)=>effPct(b)-effPct(a));

  if(!S.slatePitcherFilter&&pitchers.length>1){
    // Group by pitcher
    pitchers.filter(p=>!S.slatePitcherFilter||p===S.slatePitcherFilter).forEach(pitName=>{
      const group=sorted.filter(b=>b.pitcherName===pitName);
      if(group.length===0)return;
      const pit=S.pitchers.find(p=>p.name===pitName)||{name:pitName,hand:"?"};
      // Pitcher vulnerability from any batter in the group
      const sampleVuln=group[0]?.grade?.B?.pitcher;
      const vulnLbl=sampleVuln?.l||"";
      const isVeryHittable=vulnLbl==="Very Hittable";
      const isHittable=vulnLbl==="Hittable";
      const isTough=vulnLbl==="Tough";
      const vulnColor=isVeryHittable?"#3d9e60":isHittable?"#7db860":isTough?"#c0392b":"#6e6585";
      const vulnBg=isVeryHittable?"rgba(61,158,96,.13)":isHittable?"rgba(125,184,96,.08)":isTough?"rgba(192,57,43,.07)":"transparent";
      const vulnBorder=isVeryHittable?"rgba(61,158,96,.45)":isHittable?"rgba(125,184,96,.30)":isTough?"rgba(192,57,43,.25)":"var(--border)";
      const vulnTag=isVeryHittable?"🔥 VERY HITTABLE":isHittable?"⚡ HITTABLE":isTough?"🔒 TOUGH":vulnLbl||"";

      // Pitcher header card — color-coded by vulnerability
      const ph=el("div","slate-pitcher-hdr");
      ph.style.cssText=`background:${vulnBg};border:1.5px solid ${vulnBorder};border-radius:14px;padding:12px 14px;margin:16px 0 6px;display:flex;align-items:center;gap:10px;`;
      const isL=pit.hand==="LHP";
      const handCol=isL?"#4a7fa8":"#c8922a";
      const badge=mk("div",{width:"36px",height:"36px",borderRadius:"9px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"700",fontSize:"12px",fontFamily:"'JetBrains Mono',monospace",background:isL?"rgba(74,127,168,.18)":"rgba(200,146,42,.18)",color:handCol,flexShrink:"0",border:`1px solid ${handCol}44`});
      badge.textContent=pit.hand||"?";
      const phInfo=mk("div",{flex:"1"});
      phInfo.innerHTML=`
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;">
          <span style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--text)">${pitName}</span>
          ${vulnTag?`<span style="font-family:'Rajdhani',sans-serif;font-weight:800;font-size:11px;letter-spacing:.06em;padding:2px 8px;border-radius:6px;background:${vulnColor}22;border:1px solid ${vulnColor}55;color:${vulnColor}">${vulnTag}</span>`:""}
        </div>`;
      // Targeting summary
      const mustBats=group.filter(b=>effPct(b)>=.67);
      const avgBats=group.filter(b=>effPct(b)>=.50&&effPct(b)<.67);
      const lhbMust=mustBats.filter(b=>b.hand==="LHB").map(b=>b.name).join(", ");
      const rhbMust=mustBats.filter(b=>b.hand==="RHB").map(b=>b.name).join(", ");
      const lhbAvg=avgBats.filter(b=>b.hand==="LHB").map(b=>b.name).join(", ");
      const rhbAvg=avgBats.filter(b=>b.hand==="RHB").map(b=>b.name).join(", ");
      const targets=[];
      if(lhbMust)targets.push(`🎯 LHB: ${lhbMust}`);
      if(rhbMust)targets.push(`🎯 RHB: ${rhbMust}`);
      if(lhbAvg)targets.push(`✅ LHB: ${lhbAvg}`);
      if(rhbAvg)targets.push(`✅ RHB: ${rhbAvg}`);
      if(targets.length){
        const td=mk("div",{fontSize:"10px",color:"var(--muted)",marginTop:"4px",lineHeight:"1.7"});
        td.textContent=targets.join("  ·  ");
        phInfo.appendChild(td);
      }
      ph.appendChild(badge);ph.appendChild(phInfo);
      const cnt=mk("div",{fontFamily:"'JetBrains Mono',monospace",fontSize:"12px",color:"var(--muted)",flexShrink:"0"});
      cnt.textContent=`${group.length} batters`;
      ph.appendChild(cnt);
      c.appendChild(ph);
      group.forEach(b=>c.appendChild(mkSlateRow(b)));
    });
    // Batters without matched pitchers
    const unmatched=sorted.filter(b=>!b.pitcherName);
    if(unmatched.length){
      const ph=el("div","slate-pitcher-hdr");
      ph.innerHTML=`<div style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--muted)">⚠️ No Pitcher Matched (${unmatched.length})</div>`;
      c.appendChild(ph);
      unmatched.forEach(b=>c.appendChild(mkSlateRow(b)));
    }
  }else{
    sorted.forEach(b=>c.appendChild(mkSlateRow(b)));
  }
}

function genMatchupInsights(b){
  const points=[];
  const pit=S.pitchers.find(p=>String(p.id)===String(b.pitcherId));
  const G=b.grade.B;
  const n=v=>{const x=parseFloat(v);return isNaN(x)?null:x;};

  // Color-coded stat chip: green if good, amber if ok, muted if neutral
  function chip(label,val,great,good,higherBetter=true){
    if(val==null)return"";
    const v=parseFloat(val);
    const hot=higherBetter?v>=great:v<=great;
    const warm=higherBetter?v>=good:v<=good;
    const col=hot?"#52c278":warm?"#e8a830":"var(--muted)";
    const bg=hot?"rgba(82,194,120,.15)":warm?"rgba(232,168,48,.1)":"rgba(110,101,133,.08)";
    const border=hot?"rgba(82,194,120,.4)":warm?"rgba(232,168,48,.25)":"rgba(110,101,133,.18)";
    const weight=hot?"800":"700";
    return `<span style="display:inline-block;padding:1px 7px;border-radius:5px;font-size:11px;font-weight:${weight};font-family:'JetBrains Mono',monospace;background:${bg};border:1px solid ${border};color:${col};margin:1px 2px;">${label} ${val}</span>`;
  }

  // ── Pitcher vulnerability ──
  const vulnLbl=G.pitcher?.l||"";
  if(pit&&vulnLbl){
    const hr9=n(pit.hr9),bar=n(pit.barrelAllowed),hh=n(pit.hardHitAllowed),iso=n(pit.isoAllowed);
    const chips=[
      chip("HR/9",pit.hr9,1.4,1.0),
      chip("Barrel%",pit.barrelAllowed,10,7),
      chip("Hard Hit%",pit.hardHitAllowed,42,36),
      chip("ISO allow",pit.isoAllowed,0.20,0.15),
    ].filter(Boolean).join(" ");
    const icon=vulnLbl==="Very Hittable"?"🔥":vulnLbl==="Hittable"?"⚡":vulnLbl==="Tough"?"🔒":"⚾";
    const vulnCol=vulnLbl==="Very Hittable"?"#52c278":vulnLbl==="Hittable"?"#e8a830":vulnLbl==="Tough"?"#c0392b":"var(--muted)";
    points.push({icon,html:`<span style="color:var(--text2)">${pit.name}</span> <span style="color:${vulnCol};font-weight:700">${vulnLbl}</span><br><span style="line-height:2">${chips||"<span style='color:var(--muted);font-size:11px'>no stats — add via pitcher form</span>"}</span>`});
  }

  // ── BvP history ──
  const pH=b.pitcherHand,bH=b.hand;
  const hr=n(b.hrVsPitcher),ab=n(b.abVsPitcher),slg=n(b.slgVsPitcher),avg=n(b.avgVsPitcher),iso=n(b.iso);
  if(ab!=null&&ab>0){
    const chips=[
      hr!=null?chip("HR",b.hrVsPitcher,2,1):"",
      chip("AVG",b.avgVsPitcher,0.300,0.250),
      chip("SLG",b.slgVsPitcher,0.550,0.430),
      chip("ISO",b.iso,0.220,0.160),
    ].filter(Boolean).join(" ");
    const tag=hr>=3?"Owns this pitcher":hr>=2?"Strong history":hr>=1?"Has gone deep":avg!=null&&avg>=.270?"Productive — no HR yet":"Limited history";
    const tagCol=hr>=2?"#52c278":hr>=1?"#e8a830":"var(--muted)";
    points.push({icon:hr>=2?"💣":hr>=1?"📈":"📋",html:`<span style="color:var(--text2)">vs ${b.pitcherName||"pitcher"} in <strong>${ab} ABs</strong></span> <span style="color:${tagCol};font-weight:700">${tag}</span><br><span style="line-height:2">${chips}</span>`});
  }else if(iso!=null){
    const chips=[
      chip("ISO",b.iso,0.220,0.160),
      chip("SLG",b.slgVsPitcher,0.550,0.430),
    ].filter(Boolean).join(" ");
    points.push({icon:"📊",html:`<span style="color:var(--text2)">vs ${pH||"?"} splits</span><br><span style="line-height:2">${chips}</span>`});
  }

  // ── Platoon edge ──
  const platLbl=G.platoon?.l||"";
  if(platLbl==="Elite Edge"||platLbl==="Clear Edge"){
    const weakness=pit?.platoonWeakness&&pit.platoonWeakness!=="None / Unknown"?`<span style="color:#52c278;font-weight:700"> · ${pit.name} documented weak vs ${bH}</span>`:"";
    points.push({icon:"⚔️",html:`<span style="color:#52c278;font-weight:700">Platoon edge</span> <span style="color:var(--text2)">${bH} vs ${pH}</span>${weakness}`});
  }else if(platLbl==="Slight disadvantage"){
    points.push({icon:"⚠️",html:`<span style="color:#c0392b;font-weight:700">Same-hand matchup</span> <span style="color:var(--muted)">${bH} vs ${pH} — platoon works against</span>`});
  }

  // ── Pitcher platoon weakness ──
  if(pit?.platoonWeakness&&pit.platoonWeakness!=="None / Unknown"&&!points.some(p=>(p.html||"").includes("documented"))){
    if(pit.platoonWeakness.includes(bH)||pit.platoonWeakness==="Weak vs Both")
      points.push({icon:"🎯",html:`<span style="color:#52c278;font-weight:700">${pit.name} documented weak vs ${bH}</span>`});
  }

  // ── Lineup spot ──
  if(b.lineupSpot&&pit?.weakLineupSpots){
    const spots=(pit.weakLineupSpots||"").split(",").map(s=>s.trim());
    if(spots.includes(String(b.lineupSpot)))
      points.push({icon:"📍",html:`<span style="color:#e8a830;font-weight:700">Batting ${b.lineupSpot}</span> <span style="color:var(--muted)">— matches ${pit.name}'s weak lineup spot</span>`});
  }

  if(points.length===0)
    points.push({icon:"➡️",html:`<span style="color:var(--muted)">No pitcher data — import pitcher CSV for full breakdown</span>`});

  return points;
}

function mkSlateRow(b){
  const ep=b.normalizedPct!==undefined?b.normalizedPct:b.grade.pct;
  const sl=getSlateLabel(ep);
  const pct=Math.round(ep*100);
  const handCol=b.hand==="LHB"?"#4a7fa8":b.hand==="RHB"?"#c8922a":"#5cb870";
  const pitVuln=b.grade.B.pitcher;
  const bvp=b.grade.B.bvp;
  const platoon=b.grade.B.platoon;

  // Pitcher vulnerability visual treatment
  const vulnLbl=pitVuln?.l||"";
  const isVeryHittable=vulnLbl==="Very Hittable";
  const isHittable=vulnLbl==="Hittable";
  const rowBorder=isVeryHittable?"border:1.5px solid rgba(61,158,96,.55);box-shadow:0 0 0 3px rgba(61,158,96,.07),inset 3px 0 0 #3d9e60;":
                  isHittable?"border:1.5px solid rgba(125,184,96,.40);box-shadow:inset 3px 0 0 #7db860;":"";
  const rowBg=isVeryHittable?"background:rgba(61,158,96,.06);":isHittable?"background:rgba(125,184,96,.04);":"";

  const row=el("div","slate-row");
  row.style.cssText=(rowBorder?rowBorder+" ":"")+(rowBg||"");
  row.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
      <span class="slate-label ${sl.cls}">${sl.label}</span>
      <span style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--text);flex:1;min-width:0">${b.name}</span>
      <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:${handCol}20;color:${handCol};flex-shrink:0">${b.hand}</span>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;">
      <span>vs <strong style="color:var(--text2)">${b.pitcherName||"Unknown"}</strong>${b.pitcherHand?" ("+b.pitcherHand+")":""}</span>
      ${b.team?`<span style="color:var(--muted2)">· ${b.team}</span>`:""}
      ${!b.matched&&b.pitcherName?`<span style="color:var(--amber)">⚠️ unmatched</span>`:""}
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">
      ${vulnLbl&&vulnLbl!=="No pitcher linked"?`<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:${isVeryHittable?"rgba(61,158,96,.18)":isHittable?"rgba(125,184,96,.13)":"rgba(110,101,133,.1)"};border:1px solid ${isVeryHittable?"rgba(61,158,96,.4)":isHittable?"rgba(125,184,96,.3)":"rgba(110,101,133,.2)"};color:${isVeryHittable?"#52c278":isHittable?"#7db860":"var(--muted)"}">⚾ ${vulnLbl}</span>`:""}
      ${platoon&&platoon.l&&platoon.l!=="Slight disadvantage"?`<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:rgba(192,130,160,.1);border:1px solid rgba(192,130,160,.25);color:#c084a0">⚔️ ${platoon.l}</span>`:""}
      ${bvp&&bvp.l&&bvp.l!=="No data"&&bvp.l!=="Splits mode"?`<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:rgba(74,127,168,.1);border:1px solid rgba(74,127,168,.25);color:#4a7fa8">📋 ${bvp.l}</span>`:""}
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:2px;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);">${b.grade.total} pts</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="why-toggle" style="font-size:10px;font-weight:600;color:var(--accent2);cursor:pointer;padding:2px 8px;border-radius:6px;border:1px solid rgba(108,99,255,.3);background:rgba(108,99,255,.07);">Why? ▾</span>
        <div style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:${pct>=67?'#52c278':pct>=50?'#e8a830':pct>=40?'#b89050':'#c0392b'}">${pct}%</div>
      </div>
    </div>`;

  // Insights panel — hidden by default, shown on tap
  const insights=genMatchupInsights(b);
  const panel=mk("div",{display:"none",marginTop:"10px",paddingTop:"10px",borderTop:"1px solid var(--border)"});
  insights.forEach(pt=>{
    const line=mk("div",{display:"flex",alignItems:"flex-start",gap:"7px",marginBottom:"8px",fontSize:"12px",lineHeight:"1.5"});
    line.innerHTML=`<span style="flex-shrink:0;font-size:15px;margin-top:1px">${pt.icon}</span><span>${pt.html||pt.text||""}</span>`;
    panel.appendChild(line);
  });
  row.appendChild(panel);

  row.querySelector(".why-toggle").onclick=e=>{
    e.stopPropagation();
    const open=panel.style.display!=="none";
    panel.style.display=open?"none":"block";
    e.target.textContent=open?"Why? ▾":"Why? ▴";
  };
  return row;
}

// ── PARLAY ────────────────────────────────────────────────────────────────
function getParlayPickReason(bat){
  const b=bat.grade?.B;if(!b)return"High composite grade";
  const r=[];
  const bp=bat.bpHRProb;
  if(bp>=.18)r.push(`BP elite HR threat (${Math.round(bp*100)}%)`);
  else if(bp>=.12)r.push(`BP strong HR prob (${Math.round(bp*100)}%)`);
  const pitS=b.pitcher?.s||0;
  if(pitS>=18)r.push("pitcher allows elite HR rate");
  else if(pitS>=14)r.push("pitcher is HR-vulnerable");
  if((b.platoon?.s||0)>=9)r.push("strong platoon edge");
  if(bat.barrelPct&&parseFloat(bat.barrelPct)>=14)r.push(`high barrel rate (${bat.barrelPct}%)`);
  if(bat.hrFbPct&&parseFloat(bat.hrFbPct)>=22)r.push(`elite HR/FB% (${bat.hrFbPct}%)`);
  return r.length?r.slice(0,2).join(" · "):"High composite grade";
}

function getBatterRisk(bat){
  // 0 = consistent/low-risk, 4 = volatile/high-risk
  let risk=0;
  if(!bat.pitcherId)risk+=2; // unknown matchup is the biggest variance driver
  const filled=[bat.barrelPct,bat.avgEV,bat.hrFbPct,bat.hardHitPct].filter(v=>v&&parseFloat(v)>0).length;
  if(filled<2)risk+=1; // sparse stats = unpredictable
  if(!bat.abVsPitcher||parseInt(bat.abVsPitcher)<3)risk+=1; // no BvP sample
  return Math.min(risk,4);
}

function generateParlays(sorted){
  const gameKey=b=>(b.pitcherName||b.team||b.name).toLowerCase().trim();
  const usedIds=new Set(); // each player appears in at most one parlay
  const annotated=sorted.map(b=>({...b,_risk:getBatterRisk(b)}));

  // Pick n players: skip same-game and cross-parlay duplicates
  function pick(pool,n,sortFn){
    const src=sortFn?[...pool].sort(sortFn):pool;
    const usedGames=new Set(),res=[];
    for(const b of src){
      if(res.length>=n)break;
      const gk=gameKey(b);
      if(!usedIds.has(b.id)&&!usedGames.has(gk)){res.push(b);usedGames.add(gk);}
    }
    return res;
  }
  function commit(legs){legs.forEach(b=>usedIds.add(b.id));}

  const parlays=[];

  // 1. 🔥 Fire Power — FIRE tier only, lowest risk first
  const fireLegs=pick(
    annotated.filter(b=>b.grade?.tier==='FIRE'),3,
    (a,b)=>a._risk-b._risk||((b.normalizedPct||0)-(a.normalizedPct||0))
  );
  if(fireLegs.length>=2){
    parlays.push({name:"🔥 Fire Power",desc:"Highest-confidence FIRE picks — consistent hitters, separate games",legs:fireLegs,profile:"safe"});
    commit(fireLegs);
  }

  // 2. ⚡ Balanced Slate — best remaining by composite score
  const slateLegs=pick(annotated,3);
  if(slateLegs.length>=2){
    parlays.push({name:"⚡ Balanced Slate",desc:"Best remaining picks not already used — different games",legs:slateLegs,profile:"mixed"});
    commit(slateLegs);
  }

  // 3. 🎯 Pitcher Killers — highest pitcher vulnerability from remaining
  const pitLegs=pick(annotated,3,(a,b)=>(b.grade?.B?.pitcher?.s||0)-(a.grade?.B?.pitcher?.s||0));
  if(pitLegs.length>=2){
    parlays.push({name:"🎯 Pitcher Killers",desc:"Batters facing the most HR-vulnerable starters — fresh picks",legs:pitLegs,profile:"mixed"});
    commit(pitLegs);
  }

  // 4. 💰 Safe 4-Leg — 4 lowest-risk picks from remaining
  const safe4=pick(annotated,4,(a,b)=>a._risk-b._risk||((b.normalizedPct||0)-(a.normalizedPct||0)));
  if(safe4.length>=3){
    parlays.push({name:"💰 Safe 4-Leg",desc:"4 consistent picks with fewest unknowns — lower variance",legs:safe4,profile:"safe"});
    commit(safe4);
  }

  // 5. ✨ High Ceiling — higher-variance upside picks from remaining
  const ceilLegs=pick(annotated,3,(a,b)=>b._risk-a._risk||((b.normalizedPct||0)-(a.normalizedPct||0)));
  if(ceilLegs.length>=2){
    parlays.push({name:"✨ High Ceiling",desc:"Higher-variance picks with big upside — boom or bust",legs:ceilLegs,profile:"risky"});
    commit(ceilLegs);
  }

  // Fill if we couldn't build 5
  while(parlays.length<5){
    const fallback=pick(annotated,2);
    if(fallback.length>=2){parlays.push({name:"🛡 Best Remaining",desc:"Top remaining picks from separate games",legs:fallback,profile:"mixed"});commit(fallback);}
    else break;
  }
  return parlays.slice(0,5);
}

function rParlay(c){
  const hd=mk("div",{marginBottom:"14px"});
  const title=mk("div",{fontFamily:"'Rajdhani',sans-serif",fontWeight:"700",fontSize:"20px",color:"var(--text)",marginBottom:"3px"});
  title.textContent="🎰 Mutts AI Parlay";
  const sub=mk("div",{fontSize:"12px",color:"var(--muted)",marginBottom:"14px",lineHeight:"1.5"});
  sub.textContent="5 unique parlays from your board — no same-game players, no repeated picks across parlays.";
  hd.appendChild(title);hd.appendChild(sub);c.appendChild(hd);

  const sorted=[...S.batters].filter(b=>b.grade).sort((a,b)=>(b.normalizedPct||b.grade?.pct||0)-(a.normalizedPct||a.grade?.pct||0));
  if(sorted.length<2){
    const empty=mk("div",{textAlign:"center",color:"var(--muted)",padding:"40px 20px",fontSize:"14px",lineHeight:"1.8"});
    empty.innerHTML="No board data yet.<br>Import BallparkPal from the <strong style='color:var(--text)'>Board</strong> tab to populate picks.";
    c.appendChild(empty);return;
  }

  generateParlays(sorted).forEach((parlay,pi)=>{
    const card=mk("div",{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"18px",padding:"18px",marginBottom:"12px"});
    // Header
    const phdr=mk("div",{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"});
    const pnum=mk("div",{fontFamily:"'JetBrains Mono',monospace",fontWeight:"700",fontSize:"22px",color:"var(--amber)",flexShrink:"0"});
    pnum.textContent=`P${pi+1}`;
    const pinfo=mk("div",{flex:"1"});
    const pname=mk("div",{fontFamily:"'Rajdhani',sans-serif",fontWeight:"700",fontSize:"17px",color:"var(--text)"});
    pname.textContent=parlay.name;
    const pdesc=mk("div",{fontSize:"11px",color:"var(--muted)",marginTop:"1px"});
    pdesc.textContent=parlay.desc;
    pinfo.appendChild(pname);pinfo.appendChild(pdesc);
    const legBadge=mk("div",{background:"rgba(200,146,42,.12)",border:"1px solid rgba(200,146,42,.3)",borderRadius:"8px",padding:"3px 10px",fontSize:"12px",fontWeight:"700",color:"var(--amber)",flexShrink:"0",fontFamily:"'JetBrains Mono',monospace"});
    legBadge.textContent=`${parlay.legs.length}-Leg`;
    phdr.appendChild(pnum);phdr.appendChild(pinfo);phdr.appendChild(legBadge);
    card.appendChild(phdr);

    parlay.legs.forEach((bat,li)=>{
      const tier=bat.grade?.tier||"LEAN";
      const isFire=tier==="FIRE",isLean=tier==="LEAN";
      const tc=isFire?"#5cb870":isLean?"#e8a830":"var(--muted)";
      const tbg=isFire?"rgba(82,194,120,.12)":isLean?"rgba(200,146,42,.12)":"rgba(120,120,120,.08)";
      const risk=bat._risk??getBatterRisk(bat);
      const riskIcon=risk<=1?"🟢":risk<=2?"🟡":"🔴";
      const riskLabel=risk<=1?"Consistent":risk<=2?"Moderate":"Volatile";
      const leg=mk("div",{display:"flex",alignItems:"flex-start",gap:"10px",padding:"10px 0",borderTop:li===0?"none":"1px solid var(--border)"});
      const tierBadge=mk("div",{background:tbg,border:`1px solid ${tc}`,borderRadius:"8px",padding:"4px 8px",fontSize:"11px",fontWeight:"800",color:tc,flexShrink:"0",fontFamily:"'Rajdhani',sans-serif",letterSpacing:".04em"});
      tierBadge.textContent=isFire?"🔥 FIRE":isLean?"✅ LEAN":tier;
      const info=mk("div",{flex:"1",minWidth:"0"});
      const nameDiv=mk("div",{fontWeight:"700",fontSize:"14px",color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"});
      nameDiv.textContent=bat.name;
      const vsDiv=mk("div",{fontSize:"11px",color:"var(--muted)",marginTop:"2px",display:"flex",alignItems:"center",gap:"6px"});
      vsDiv.innerHTML=`<span>vs ${bat.pitcherName||"TBD"} · ${bat.hand||""}</span><span style="font-size:10px">${riskIcon} ${riskLabel}</span>`;
      const statsRow=mk("div",{display:"flex",gap:"10px",marginTop:"6px",flexWrap:"wrap"});
      const addStat=(l,v,hi)=>{if(!v&&v!==0)return;const s=mk("div",{fontSize:"10px",color:"var(--muted)"});s.innerHTML=`<span style="font-weight:700;color:${hi?'var(--green2)':'var(--text2)'}">${v}</span> ${l}`;statsRow.appendChild(s);};
      if(bat.bpHRProb!=null)addStat("BP HR",`${Math.round(bat.bpHRProb*100)}%`,bat.bpHRProb>=.15);
      if(bat.barrelPct)addStat("Barrel",`${bat.barrelPct}%`,parseFloat(bat.barrelPct)>=13);
      if(bat.hrFbPct)addStat("HR/FB",`${bat.hrFbPct}%`,parseFloat(bat.hrFbPct)>=22);
      const pitS=bat.grade?.B?.pitcher?.s||0;
      if(pitS>0)addStat("Pit Vuln",`${pitS}/24`,pitS>=16);
      const reasonDiv=mk("div",{fontSize:"10px",color:"var(--muted)",marginTop:"5px",fontStyle:"italic"});
      reasonDiv.textContent=getParlayPickReason(bat);
      info.appendChild(nameDiv);info.appendChild(vsDiv);info.appendChild(statsRow);info.appendChild(reasonDiv);
      const pct=bat.normalizedPct??bat.grade?.pct??0;
      const pctDiv=mk("div",{fontFamily:"'JetBrains Mono',monospace",fontWeight:"700",fontSize:"16px",color:tc,flexShrink:"0",textAlign:"right"});
      pctDiv.innerHTML=`${Math.round(pct*100)}%<div style="font-size:9px;font-weight:400;color:var(--muted);margin-top:1px">grade</div>`;
      leg.appendChild(tierBadge);leg.appendChild(info);leg.appendChild(pctDiv);
      card.appendChild(leg);
    });
    c.appendChild(card);
  });

  const disc=mk("div",{fontSize:"10px",color:"var(--muted)",textAlign:"center",padding:"10px 0 20px",lineHeight:"1.6"});
  disc.textContent="Parlays are AI-generated from your graded board. All bets carry risk — use as guidance only.";
  c.appendChild(disc);
}
